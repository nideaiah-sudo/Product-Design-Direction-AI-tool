name: 🐛 Bug 报告
description: 报告程序中的 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告，请尽量填写完整，以便我们快速定位和修复。
  - type: input
    id: version
    attributes:
      label: 工具版本
      description: 你使用的工具版本或 commit 号
      placeholder: 例如：v0.1.0 或 main@abc1234
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 10
        - Windows 11
        - 其他
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰描述你遇到的 Bug
      placeholder: 例如：生成 M5x12 螺丝 STEP 时程序报错。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请列出复现该问题的步骤
      placeholder: |
        1. 打开程序
        2. 输入 ...
        3. 点击 ...
        4. 出现错误
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      description: 你期望看到的结果是什么？
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际出现的结果是什么？包括报错信息、截图等。
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 其他有助于排查的信息
